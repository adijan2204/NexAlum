<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NexAlum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #6D28D9 0%, #4C1D95 100%);
        }
    </style>
</head>

<body class="bg-[#F8F7FF] min-h-screen">
    <nav class="bg-white border-b border-purple-50 py-4 px-6 fixed w-full top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-purple-900">NexAlum <span class="text-sm font-normal text-purple-400">|
                    Admin</span></h1>
            <div class="flex items-center space-x-3 md:space-x-6">
                <span class="font-semibold text-gray-700 hidden md:inline">Administrator</span>
                <button onclick="logout()"
                    class="text-red-500 font-medium hover:underline text-sm md:text-base">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto pt-24 px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-50">
                <p class="text-gray-500 font-semibold mb-2">Total Users</p>
                <h3 class="text-4xl font-bold text-purple-900">22</h3>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-50">
                <p class="text-gray-500 font-semibold mb-2">Pending Approvals</p>
                <h3 class="text-4xl font-bold text-orange-500">01</h3>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-50">
                <p class="text-gray-500 font-semibold mb-2">Active Jobs</p>
                <h3 class="text-4xl font-bold text-indigo-500">08</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-purple-50 overflow-hidden">
            <div class="p-6 md:p-8 border-b border-gray-50">
                <h2 class="text-xl md:text-2xl font-bold text-gray-900">Pending Alumni Registration</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px] md:min-w-full">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase">
                        <tr>
                            <th class="px-8 py-4 px-8">Full Name</th>
                            <th class="px-8 py-4">Grad Year</th>
                            <th class="px-8 py-4">Company</th>
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr>
                            <td class="px-8 py-6 font-semibold">Mansi Mate</td>
                            <td class="px-8 py-6">2026</td>
                            <td class="px-8 py-6">Amazon</td>
                            <td class="px-8 py-6"><span
                                    class="px-3 py-1 rounded-full bg-orange-50 text-orange-500 text-xs font-bold uppercase">Pending</span>
                            </td>
                            <td class="px-8 py-6 space-x-2">
                                <button
                                    class="px-4 py-2 rounded-lg bg-purple-600 text-white font-bold text-xs">Approve</button>
                                <button
                                    class="px-4 py-2 rounded-lg bg-gray-100 text-gray-500 font-bold text-xs">Reject</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchPendingAlumni() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/users/alumni', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const alumni = await res.json();
                const tableBody = document.querySelector('tbody');
                tableBody.innerHTML = '';

                let pendingCount = 0;
                let totalCount = alumni.length;

                alumni.forEach(user => {
                    if (!user.isApproved) {
                        pendingCount++;
                        tableBody.innerHTML += `
                            <tr>
                                <td class="px-8 py-6 font-semibold">${user.fullName}</td>
                                <td class="px-8 py-6">${user.graduationYear || 'N/A'}</td>
                                <td class="px-8 py-6">${user.currentCompany || 'N/A'}</td>
                                <td class="px-8 py-6"><span class="px-3 py-1 rounded-full bg-orange-50 text-orange-500 text-xs font-bold uppercase">Pending</span></td>
                                <td class="px-8 py-6 space-x-2">
                                    <button onclick="approveUser('${user._id}')" class="px-4 py-2 rounded-lg bg-purple-600 text-white font-bold text-xs">Approve</button>
                                    <button class="px-4 py-2 rounded-lg bg-gray-100 text-gray-500 font-bold text-xs">Reject</button>
                                </td>
                            </tr>
                        `;
                    }
                });

                // Update Stats
                document.querySelectorAll('h3')[0].innerText = totalCount.toString().padStart(2, '0');
                document.querySelectorAll('h3')[1].innerText = pendingCount.toString().padStart(2, '0');

                if (tableBody.innerHTML === '') {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-8 py-10 text-center text-gray-400">All applications processed.</td></tr>';
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function approveUser(id) {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/users/approve/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('User approved!');
                    fetchPendingAlumni();
                }
            } catch (err) {
                alert('Approval failed');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../../index.html';
        }

        window.onload = fetchPendingAlumni;
    </script>
</body>

</html>
