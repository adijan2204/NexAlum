<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Dashboard - NexAlum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #6D28D9 0%, #4C1D95 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(109, 40, 217, 0.1);
        }

        .chat-container {
            height: 600px;
        }

        .contact-list {
            width: 100%;
            border-bottom: 1px solid rgba(109, 40, 217, 0.1);
        }

        @media (min-width: 768px) {
            .contact-list {
                width: 300px;
                border-bottom: none;
                border-right: 1px solid rgba(109, 40, 217, 0.1);
            }
        }

        .msg-alumni {
            background: #6D28D9;
            color: white;
            border-radius: 1.5rem 1.5rem 0 1.5rem;
            align-self: flex-end;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.2);
        }

        .msg-student {
            background: white;
            color: #1F2937;
            border-radius: 1.5rem 1.5rem 1.5rem 0;
            align-self: flex-start;
            border: 1px solid #F3F4F6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .nav-btn {
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: linear-gradient(135deg, #6D28D9 0%, #4C1D95 100%) !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-[#F8F7FF] min-h-screen pb-12">
    <nav class="bg-white border-b border-purple-50 py-4 px-6 fixed w-full top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-purple-900">NexAlum <span class="text-sm font-normal text-purple-400">|
                    Alumni</span></h1>
            <div class="flex items-center space-x-6">
                <span id="userName" class="font-semibold text-gray-700">Alumni Name</span>
                <button onclick="logout()" class="text-red-500 font-medium hover:underline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto pt-24 px-6 flex flex-col md:flex-row gap-8">
        <!-- Sidebar -->
        <aside class="md:w-64 space-y-4">
            <button onclick="showSection('messages')"
                class="w-full text-left px-6 py-4 rounded-2xl bg-white shadow-sm nav-btn group">
                <span class="font-bold">Chat Requests</span>
            </button>
            <button onclick="showSection('alumni-chats')"
                class="w-full text-left px-6 py-4 rounded-2xl bg-white shadow-sm nav-btn group">
                <span class="font-bold">My Chats</span>
            </button>
            <button onclick="showSection('profile-update')"
                class="w-full text-left px-6 py-4 rounded-2xl bg-white shadow-sm nav-btn group">
                <span class="font-bold">Update Profile</span>
            </button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <!-- Messages Section -->
            <section id="messages" class="section-content">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-50">
                    <h2 class="text-3xl font-bold text-purple-900 mb-6">Pending Connections</h2>
                    <div id="requestList" class="space-y-4">
                        <div class="flex flex-col items-center justify-center py-12 text-gray-400 opacity-50">
                            <p>No pending requests.</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chat Section -->
            <section id="alumni-chats" class="section-content hidden">
                <div class="bg-white rounded-3xl shadow-sm border border-purple-50 flex flex-col md:flex-row chat-container overflow-hidden">
                    <!-- Contacts Sidebar -->
                    <div class="contact-list flex flex-col bg-gray-50/30">
                        <div class="p-6 border-b border-purple-50 bg-white">
                            <h3 class="font-bold text-purple-900">Student Chats</h3>
                        </div>
                        <div id="contactsSidebar" class="flex-1 overflow-y-auto">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Chat Window -->
                    <div class="flex-1 flex flex-col bg-white">
                        <div
                            class="p-6 border-b border-purple-50 flex justify-between items-center bg-white/50 backdrop-blur-md">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 purple-gradient rounded-xl flex items-center justify-center text-white font-bold"
                                    id="activeStudentInitials">?</div>
                                <h2 id="chatWith" class="text-xl font-bold text-purple-900">Select a Student</h2>
                            </div>
                        </div>

                        <div id="chatMessages"
                            class="flex-1 overflow-y-auto p-6 flex flex-col space-y-4 bg-[#F8F7FF]/50">
                            <div
                                class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
                                <div
                                    class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                                        </path>
                                    </svg>
                                </div>
                                <p class="font-bold">Select a student to start chatting</p>
                            </div>
                        </div>

                        <div class="p-6 border-t border-purple-50">
                            <div class="flex gap-4">
                                <input type="text" id="messageInput" placeholder="Select a student first..." disabled
                                    class="flex-1 px-6 py-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-purple-400 outline-none transition duration-300">
                                <button onclick="sendMessage()" id="sendBtn" disabled
                                    class="px-8 py-3 bg-gray-300 text-white rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg">Reply</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Update Profile Section -->
            <section id="profile-update" class="section-content hidden">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-purple-50">
                    <h2 class="text-3xl font-bold text-purple-900 mb-8">Professional Profile</h2>
                    <form id="profileForm" class="space-y-8">
                        <div>
                            <label
                                class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Professional
                                Bio</label>
                            <textarea id="profileBio" rows="4"
                                class="w-full px-6 py-4 rounded-3xl bg-gray-50 border-none focus:ring-2 focus:ring-purple-400 outline-none transition"
                                placeholder="Tell students about your journey..."></textarea>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label
                                    class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Skills</label>
                                <input type="text" id="profileSkills"
                                    class="w-full px-6 py-4 rounded-full bg-gray-50 border-none focus:ring-2 focus:ring-purple-400 outline-none transition"
                                    placeholder="React, Node.js, Architecture">
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">LinkedIn
                                    Profile URL</label>
                                <input type="url" id="profileLinkedIn"
                                    class="w-full px-6 py-4 rounded-full bg-gray-50 border-none focus:ring-2 focus:ring-purple-400 outline-none transition"
                                    placeholder="https://linkedin.com/in/username">
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full md:w-auto px-12 py-4 rounded-2xl purple-gradient text-white font-bold text-lg shadow-xl shadow-purple-100 opacity-90 hover:opacity-100 transition">Save
                            Profile Changes</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const studentHistories = {
            "Anacleto": [
                { sender: "alumni", text: "Hello Anacleto! Thanks for connecting." },
                { sender: "student", text: "Hi Vaishanavi! I'm really impressed by your NexAlum project." },
                { sender: "alumni", text: "Thank you! I'd be happy to guide you on React and development best practices." },
                { sender: "student", text: "That would be awesome! When are you free for a quick call?" }
            ]
        };

        let activeStudent = null;

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'messages') loadRequests();
            if (id === 'alumni-chats') loadStudentContacts();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../../index.html';
        }

        async function loadRequests() {
            const list = document.getElementById('requestList');
            
            // 1. SHOW LOCAL STORAGE REQUESTS (LEGACY)
            const pendingLocal = JSON.parse(localStorage.getItem('pendingRequests') || '[]');
            list.innerHTML = '';
            
            pendingLocal.forEach(name => {
                list.innerHTML += `
                    <div class="p-6 border border-purple-50 rounded-2xl flex justify-between items-center bg-gray-50/50">
                        <div>
                            <h4 class="font-bold text-gray-900">${name}</h4>
                            <p class="text-sm text-gray-500 italic">"Hello, I want to connect with you."</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="acceptRequestLocal('${name}')" class="px-6 py-2 purple-gradient text-white rounded-xl text-sm font-bold shadow-lg shadow-purple-100">Accept</button>
                            <button class="px-6 py-2 bg-white text-gray-400 border border-gray-100 rounded-xl text-sm font-bold">Ignore</button>
                        </div>
                    </div>
                `;
            });

            // 2. FETCH REAL REQUESTS FROM BACKEND
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/users/pending-requests', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const requests = await res.json();
                    requests.forEach(req => {
                        list.innerHTML += `
                            <div class="p-6 border border-purple-50 rounded-2xl flex justify-between items-center bg-white shadow-sm">
                                <div>
                                    <h4 class="font-bold text-gray-900">${req.student.fullName}</h4>
                                    <p class="text-[10px] text-purple-600 font-bold uppercase">Class of ${req.student.graduationYear || 'N/A'}</p>
                                    <p class="text-sm text-gray-500 italic mt-1">"${req.message}"</p>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="acceptRequest('${req._id}', '${req.student.fullName}')" class="px-6 py-2 purple-gradient text-white rounded-xl text-sm font-bold shadow-lg">Accept Request</button>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.log('Backend sync failed');
            }

            if (list.innerHTML === '') {
                list.innerHTML = '<div class="flex flex-col items-center justify-center py-12 text-gray-400 opacity-50"><p>No pending requests.</p></div>';
            }
        }

        function loadStudentContacts() {
            const sidebar = document.getElementById('contactsSidebar');
            const accepted = JSON.parse(localStorage.getItem('acceptedRequests') || '[]');

            sidebar.innerHTML = '';
            if (accepted.length === 0) {
                sidebar.innerHTML = '<div class="p-6 text-center text-gray-400">No connected students yet</div>';
                return;
            }

            accepted.forEach(name => {
                sidebar.innerHTML += `
                    <button onclick="openChat('${name}')" class="w-full p-6 text-left hover:bg-white transition border-b border-purple-50 ${activeStudent === name ? 'bg-white border-l-4 border-l-purple-600' : ''}">
                         <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-lg purple-gradient flex items-center justify-center text-white text-xs font-bold">${name[0]}</div>
                            <div>
                                <h4 class="font-bold text-gray-900 text-sm">${name}</h4>
                                <p class="text-[9px] font-bold text-green-500 uppercase tracking-widest text-green-500">Connected</p>
                            </div>
                         </div>
                    </button>
                `;
            });
        }

        function openChat(name) {
            activeStudent = name;
            showSection('alumni-chats');
            document.getElementById('chatWith').innerText = name;
            document.getElementById('activeStudentInitials').innerText = name[0];

            const chatBox = document.getElementById('chatMessages');
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');

            chatBox.innerHTML = '';
            input.disabled = false;
            input.placeholder = `Reply to ${name}...`;
            btn.disabled = false;
            btn.classList.add('purple-gradient');
            btn.classList.remove('bg-gray-300');

            const history = studentHistories[name] || [{ sender: "student", text: "Hello, I want to connect with you." }];
            history.forEach(m => {
                chatBox.innerHTML += `
                    <div class="px-5 py-3 max-w-[80%] shadow-sm ${m.sender === 'alumni' ? 'msg-alumni' : 'msg-student'}">
                        ${m.text}
                    </div>
                `;
            });
            loadStudentContacts();
        }

        function sendMessage() {
            const msg = document.getElementById('messageInput').value;
            if (msg) {
                const chatBox = document.getElementById('chatMessages');
                chatBox.innerHTML += `<div class="px-5 py-3 max-w-[80%] msg-alumni">${msg}</div>`;
                document.getElementById('messageInput').value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        async function acceptRequest(requestId, studentName) {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/users/accept-request/${requestId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    // Also add to local accepted so chat works with existing logic
                    let accepted = JSON.parse(localStorage.getItem('acceptedRequests') || '[]');
                    if (!accepted.includes(studentName)) accepted.push(studentName);
                    localStorage.setItem('acceptedRequests', JSON.stringify(accepted));
                    
                    alert('Connection Accepted!');
                    loadRequests();
                }
            } catch (err) {
                alert('Action failed');
            }
        }

        function acceptRequestLocal(name) {
            let accepted = JSON.parse(localStorage.getItem('acceptedRequests') || '[]');
            if (!accepted.includes(name)) accepted.push(name);
            localStorage.setItem('acceptedRequests', JSON.stringify(accepted));

            let pending = JSON.parse(localStorage.getItem('pendingRequests') || '[]');
            pending = pending.filter(p => p !== name);
            localStorage.setItem('pendingRequests', JSON.stringify(pending));

            alert('Connection Accepted! ' + name + ' can now receive your messages.');
            loadRequests();
        }

        document.getElementById('userName').innerText = localStorage.getItem('fullName') || 'Alumnus';

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const bio = document.getElementById('profileBio').value;
            const skills = document.getElementById('profileSkills').value.split(',').map(s => s.trim());
            const linkedIn = document.getElementById('profileLinkedIn').value;
            
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ bio, skills, linkedIn })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Professional profile updated successfully!');
                } else {
                    alert(data.message || 'Update failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        });

        window.onload = () => {
            // Demo data initialization for Alumni as well
            if (!localStorage.getItem('acceptedRequests')) {
                localStorage.setItem('acceptedRequests', JSON.stringify([]));
            }
            loadRequests();
        };
    </script>
</body>

</html>
