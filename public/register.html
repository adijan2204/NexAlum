<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NexAlum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #6D28D9 0%, #4C1D95 100%);
        }
    </style>
</head>

<body class="bg-[#F8F7FF] flex items-center justify-center min-h-screen py-20 px-6">
    <div
        class="max-w-xl w-full bg-white/80 backdrop-blur-xl rounded-3xl md:rounded-[3rem] shadow-2xl p-6 md:p-12 border border-purple-100/50">
        <div class="text-center mb-10">
            <div
                class="w-12 h-12 md:w-16 md:h-16 purple-gradient rounded-2xl mx-auto mb-4 md:mb-6 flex items-center justify-center text-white font-bold text-xl md:text-2xl shadow-lg shadow-purple-200">
                N</div>
            <h1 class="text-2xl md:text-4xl font-bold text-purple-900 tracking-tight">Create Account</h1>
            <p class="text-gray-400 md:text-gray-500 mt-2 md:mt-3 font-medium text-sm md:text-base">Join the premium NexAlum community</p>
        </div>

        <form id="registerForm" class="space-y-4 md:space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Full Name</label>
                    <input type="text" id="fullName" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="e.g. Shruti Ingole">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Email
                        Address</label>
                    <input type="email" id="email" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="yourname@gmail.com">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Phone Number</label>
                    <input type="tel" id="phone" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="+91 00000 00000">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">College Name</label>
                    <input type="text" id="college" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="e.g. MIT Pune">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Graduation Year</label>
                    <input type="number" id="gradYear" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="2026">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">User Role</label>
                    <select id="role"
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none appearance-none cursor-pointer transition duration-300">
                        <option value="student"> Student</option>
                        <option value="alumni"> Alumni</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-6 py-4 rounded-full bg-gray-50 border-transparent focus:bg-white focus:border-purple-200 focus:ring-4 focus:ring-purple-100 outline-none transition duration-300"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 md:py-4 rounded-xl purple-gradient text-white font-bold text-base md:text-lg shadow-lg hover:shadow-purple-200 transition">Register
                Now</button>
        </form>

        <p class="mt-8 text-center text-gray-600 text-sm">
            Already have an account? <a href="index.html" class="text-purple-600 font-bold hover:underline">Back to
                Login</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Registration Successful! You can now login.');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
